<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excelência - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <div class="logo">
                <h1>🐙 Excelência</h1>
                <p style="color:rgba(255,255,255,0.6);margin-top:10px;">Sistema de Agenda e Escalas</p>
            </div>

            <!-- Formulário de Login -->
            <div id="loginForm" class="form active">
                <h2>Entrar</h2>
                <form onsubmit="fazerLogin(event)">
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="loginSenha">Senha</label>
                        <input type="password" id="loginSenha" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn">Enter</button>
                </form>
                <p class="switch-form">
                    Não tem conta? <a href="#" onclick="mostrarCadastro()">Cadastre-se</a>
                </p>
                <div id="loginMsg" class="msg"></div>
            </div>

            <!-- Formulário de Cadastro -->
            <div id="cadastroForm" class="form">
                <h2>Cadastrar</h2>
                <form onsubmit="fazerCadastro(event)">
                    <div class="input-group">
                        <label for="cadastroNome">Nome</label>
                        <input type="text" id="cadastroNome" placeholder="Seu nome" required>
                    </div>
                    <div class="input-group">
                        <label for="cadastroEmail">Email</label>
                        <input type="email" id="cadastroEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="cadastroSenha">Senha</label>
                        <input type="password" id="cadastroSenha" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <div class="input-group">
                        <label for="cadastroTipo">Tipo de Conta</label>
                        <select id="cadastroTipo" required>
                            <option value="usuario">Usuário Padrão</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Cadastrar</button>
                </form>
                <p class="switch-form">
                    Já tem conta? <a href="#" onclick="mostrarLogin()">Faça login</a>
                </p>
                <div id="cadastroMsg" class="msg"></div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
